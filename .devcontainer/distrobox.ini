# distrobox.ini — Définition déclarative de l'environnement de dev
#
# Reconstruit l'environnement identique sur n'importe quelle machine
# (workstation Fedora, home-server Ubuntu) :
#
#   distrobox assemble create --file .devcontainer/distrobox.ini
#
# Pour entrer :     distrobox enter website
# Pour recréer :    podman rm -f website
#                && distrobox assemble create --file .devcontainer/distrobox.ini
#
# Base : Ubuntu 26.04 — parité avec home-server et runners GitHub Actions.
#
# Note sur les chemins : distrobox monte automatiquement ton $HOME entier
# dans le conteneur (préservation des chemins). Inutile de définir un
# volume custom — le repo est accessible à son chemin hôte naturel
# (ex. /home/user/projects/website) depuis l'intérieur du conteneur.
#
# Note sur init_hooks : selon la version de distrobox, le hook ci-dessous
# n'est pas toujours déclenché de manière fiable. Si le provisioning ne
# tourne pas automatiquement à la création, lance-le à la main :
#
#   bash $HOME/projects/website/.devcontainer/provision.sh
#
# (depuis l'intérieur du conteneur, via `distrobox enter website`)

[website]
image=ubuntu:26.04

# Paquets système installés à la création du conteneur.
# Inclut R, pandoc, et toutes les libs -dev nécessaires à la compilation
# des packages R utilisés par le build du CV (rmarkdown, pagedown et
# leurs dépendances).
additional_packages="r-base r-base-dev pandoc curl ca-certificates gnupg build-essential pkg-config libssl-dev libxml2-dev libcurl4-openssl-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff-dev libjpeg-dev zlib1g-dev libicu-dev libuv1-dev"

# Chromium n'est PAS dans additional_packages : `apt install chromium-browser`
# sur Ubuntu 26.04 installe un wrapper qui réclame le snap chromium, et
# snapd ne tourne pas en conteneur. provision.sh installe Google Chrome
# stable depuis le dépôt officiel (vrai .deb, même moteur Blink que
# Chromium — équivalent pour pagedown::chrome_print).

# Quarto n'est pas non plus dans apt — installé par provision.sh
# depuis la dernière release GitHub officielle.

# Hook de provisioning : packages R + Chrome + Quarto.
# Le `|| true` évite que distrobox marque la création comme échouée
# si le hook ne se déclenche pas (cas connu selon les versions).
init_hooks="bash $HOME/projects/website/.devcontainer/provision.sh || true"

pull=true
replace=false
