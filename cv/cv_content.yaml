title:
  fr: "Senior Data Scientist"
  en: "Senior Data Scientist"

summary:
  fr: >
    Senior Data Scientist avec 14 ans d'expérience en analytics et modélisation prédictive,
    de l'ingénierie industrielle à l'industrialisation MLOps. Expert en déploiement de
    modèles à impact mesurable (churn, scoring, recommandation) via Databricks et CI/CD.
    Alliant expertise technique et vision business (pricing, économie). Expérience de
    management d'équipe data/CRM. Passionné par la transmission de connaissances et le mentorat.
  en: >
    Senior Data Scientist with 14 years of experience in analytics and predictive modeling,
    from industrial engineering to MLOps industrialization. Expert in deploying models with
    measurable impact (churn, scoring, recommender) via Databricks and CI/CD. Combining
    technical expertise with business acumen (pricing, economics). Data/CRM team management
    experience. Passionate about knowledge sharing and mentoring.

