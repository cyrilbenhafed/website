experience:
  - company: "Cegid"
    role:
      fr: "Data Scientist"
      en: "Data Scientist"
    period: "2022 – Present"
    details:
      fr:
        - "Conception et déploiement de modèles prédictifs (lead scoring, recommandation) améliorant conversion et rétention."
        - "Industrialisation end-to-end : workflows LLM/NLP, intégration open data, automatisation CRM (Databricks, MLflow)."
        - "Implémentation bonnes pratiques MLOps : CI/CD, APIs, monitoring..."
      en:
        - "Designed and deployed predictive models (lead scoring, recommender) improving conversion and retention."
        - "End-to-end industrialization: LLM/NLP workflows, open data integration, CRM automation (Databricks, MLflow)."
        - "Implemented MLOps best practices: CI/CD, APIs, performance monitoring."

  - company: "Cegid"
    role:
      fr: "Head of Marketing Data"
      en: "Head of Marketing Data"
    period: "2020 – 2022"
    details:
      fr:
        - "Management d'une équipe data/CRM (4 personnes) : recrutement, montée en compétences, coordination projets."
        - "Développement de modèles prédictifs pour optimisation marketing (churn, segmentation)."
        - "Pilotage stratégique CRM et alignement avec direction marketing/ventes."
      en:
        - "Managed data/CRM team (4 people): hiring, skills development, project coordination."
        - "Built predictive models for marketing optimization (churn, segmentation)."
        - "Led strategic CRM initiatives, aligned with marketing/sales leadership."

  - company: "Cegid"
    role:
      fr: "Pricing Strategist"
      en: "Pricing Strategist"
    period: "2019 – 2020"
    details:
      fr:
        - "Stratégies tarifaires data-driven basées sur modélisation et analyses comportementales."
        - "Déploiement et suivi avec le top management, impact direct sur revenus."
      en:
        - "Data-driven pricing strategies based on modeling and behavioral analysis."
        - "Deployment and monitoring with top management, direct revenue impact."

  - company: "SNCF Connect"
    role:
      fr: "Business Analyst"
      en: "Business Analyst"
    period: "2016 – 2018"
    details:
      fr:
        - "Pilotage analytique multi-marchés (France + Europe) pour le 1er site e-commerce français (4Md€ de ventes)."
        - "Analyses financières, web analytics et tendances ventes pour décisions stratégiques."
        - "Initiatives cross-fonctionnelles (Marketing, Sales, IT) : optimisation flux data, implémentation outils."
      en:
        - "Multi-market analytics lead (France + Europe) for France's #1 e-commerce site (€4B sales)."
        - "Financial analysis, web analytics and sales trends for strategic decision-making."
        - "Cross-functional initiatives (Marketing, Sales, IT): data flow optimization, tool implementation."

  - company: "Disneyland Paris"
    role:
      fr: "Ingénieur Industriel / Analyste Pricing"
      en: "Industrial Engineer / Pricing Analyst"
    period: "2010 – 2016"
    details:
      fr:
        - "Modèles prédictifs (forecast centre d'appels, optimisation workflows) et pricing strategies transport multi-marchés."
        - "Management terrain et contribution projets IT Agile : intégration exigences transport dans architecture système."
      en:
        - "Predictive models (call center forecasting, workflow optimization) and multi-market transport pricing strategies."
        - "Field team management and Agile IT project: integrated transport requirements into system architecture."

